name: Auto-Update FII & DII Data

on:
  schedule:
      # 12:30 UTC = 6:00 PM IST - NSE publishes data after market close (3:30 PM IST)
          - cron: '30 12 * * 1-5'  # Monday-Friday only
            workflow_dispatch:  # Allow manual trigger from GitHub Actions tab

            jobs:
              update-fii-dii-data:
                  runs-on: ubuntu-latest
                      permissions:
                            contents: write  # needed to commit data files back to repo

                                steps:
                                      - name: Checkout repo
                                              uses: actions/checkout@v4

                                                    - name: Set up Python
                                                            uses: actions/setup-python@v5
                                                                    with:
                                                                              python-version: '3.11'

                                                                                    - name: Install dependencies
                                                                                            run: pip install requests

                                                                                                  - name: Fetch all NSE data (FII/DII + Bulk + Block + F&O COT)
                                                                                                          run: python scripts/fetch_data.py
                                                                                                          
                                                                                                                - name: Commit updated data
                                                                                                                        run: |
                                                                                                                                  git config user.name "github-actions[bot]"
                                                                                                                                            git config user.email "github-actions[bot]@users.noreply.github.com"
                                                                                                                                                      git add data/latest.json data/history.json data/bulk_deals.json data/block_deals.json data/fno_cot.json
                                                                                                                                                                git diff --staged --quiet && echo "No new data today." || \
                                                                                                                                                                            git commit -m "data: auto-update $(date +'%d-%b-%Y %H:%M UTC')"
                                                                                                                                                                                      git push
